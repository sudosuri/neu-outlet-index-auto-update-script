name: Rebuild filter index

on:
  # Scheduled runs RETIRED 2026-07-17 — the Vercel cron (every 20 min, see ../vercel.json) is now the
  # sole scheduler; GitHub's hosted-runner queue lagged 20-30 min. Kept as a MANUAL fallback only.
  # (The deploy target is the committed LIVE_THEME_ID in deploy-index.mjs, not the NEU_THEME_ID var.)
  workflow_dispatch: {}       # manual runs from the Actions tab

concurrency:
  group: rebuild-index
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    environment: Neu Outlet        # secrets/vars live on this environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build index from live Shopify data
        env:
          NEU_SHOPIFY_STORE: ${{ vars.NEU_SHOPIFY_STORE }}
          NEU_SHOPIFY_ACCESS_TOKEN: ${{ secrets.NEU_SHOPIFY_ACCESS_TOKEN }}
          NEU_SHOPIFY_API_VERSION: '2025-01'
        run: node build-index.mjs
      - name: Deploy index to the theme
        env:
          NEU_SHOPIFY_STORE: ${{ vars.NEU_SHOPIFY_STORE }}
          NEU_SHOPIFY_ACCESS_TOKEN: ${{ secrets.NEU_SHOPIFY_ACCESS_TOKEN }}
          NEU_SHOPIFY_API_VERSION: '2025-01'
          NEU_THEME_ID: ${{ vars.NEU_THEME_ID }}
        run: node deploy-index.mjs
